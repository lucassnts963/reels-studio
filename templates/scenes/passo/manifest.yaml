id: passo
name: "Passo"
desc: "Cartão de transição: número grande + título"
formato: tutorial
order: 20
scene: { type: passo, duration: 4 }
fields:
  - { name: numero, label: "número", type: number, step: 1, default: 1 }
  - { name: total, label: "total", type: number, step: 1, default: 5 }
  - { name: titulo, label: "título", type: text, default: "Título do passo" }
  - { name: subtitulo, label: "subtítulo", type: text }
  - { name: src, label: "mídia à direita (opcional: print ou vídeo)", type: asset, kind: media }
  - name: dispositivo
    label: "moldura da mídia (se houver)"
    type: select
    default: celular
    options:
      - [celular, "Celular (moldura de telefone)"]
      - [pc, "PC (janela de navegador)"]
  - name: midia
    label: "tipo da mídia (se houver)"
    type: select
    default: imagem
    options:
      - [imagem, "Imagem (print)"]
      - [video, "Vídeo (gravação)"]
  - { name: url, label: "URL na barra (só PC, decorativa)", type: text, mono: true }
