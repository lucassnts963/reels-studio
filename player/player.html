<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>reels-studio player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
  #root { position: fixed; inset: 0; }
  #err { color: #f66; font: 14px/1.5 monospace; padding: 40px; white-space: pre-wrap; }
</style>
<script src="/engine/vendor/react.js"></script>
<script src="/engine/vendor/react-dom.js"></script>
<script src="/engine/vendor/babel.js"></script>
</head>
<body>
<div id="root"></div>
<script>
(async () => {
  const q = new URLSearchParams(location.search);
  const slug = q.get('reel');
  if (!slug) {
    const list = await (await fetch('/api/reels')).json().catch(() => []);
    document.body.innerHTML = '<div id="err" style="color:#eee">reels-studio — use ?reel=&lt;slug&gt;\n\nDisponíveis:\n' +
      list.map(s => '  · <a style="color:#E5484D" href="/player/player.html?reel=' + s + '">' + s + '</a>').join('\n') + '</div>';
    return;
  }
  const res = await fetch('/projects/' + slug + '/project.json');
  if (!res.ok) throw new Error('projects/' + slug + '/project.json não encontrado (' + res.status + ')');
  const cfg = await res.json();
  window.REEL_CONFIG = cfg;
  // base para resolver caminhos de asset relativos ao projeto (ex.: "assets/gravacoes/foo.mp4").
  window.__ASSET_BASE = '/projects/' + slug + '/';

  // tema (file-driven): o reel-kit lê window.__THEME ao ser avaliado, então
  // buscamos ANTES do loop de arquivos. Sem tema, o reel-kit usa o default.
  const themeId = cfg.theme || 'elucas';
  const theme = await fetch('/api/theme/' + encodeURIComponent(themeId)).then(r => r.ok ? r.json() : null).catch(() => null);
  window.__THEME = theme || null;
  // fontes próprias do tema: injeta @font-face apontando pros assets do tema.
  for (const ff of (theme?.fontFaces || [])) {
    if (!ff.src) continue;
    const s = document.createElement('style');
    s.textContent = `@font-face{font-family:${JSON.stringify(ff.family)};` +
      (ff.weight ? `font-weight:${ff.weight};` : '') + (ff.style ? `font-style:${ff.style};` : '') +
      `src:url(${JSON.stringify(ff.src)}) format('woff2');font-display:block;}`;
    document.head.appendChild(s);
  }

  // catálogos file-driven: o tutorial.jsx lê __SCENE_TEMPLATES (layout de cena) e
  // o quiz.jsx lê __QUIZ_TEMPLATES (layout temporal do quiz). Buscados antes do loop.
  window.__SCENE_TEMPLATES = await fetch('/api/scene-templates').then(r => r.ok ? r.json() : []).catch(() => []);
  window.__QUIZ_TEMPLATES = await fetch('/api/quiz-templates').then(r => r.ok ? r.json() : []).catch(() => []);

  const files = [
    '/engine/animations.jsx',
    '/engine/reel-kit.jsx',
    '/engine/layout-renderer.jsx',
    '/engine/quiz-renderer.jsx',
    cfg.formato === 'custom' ? '/custom/' + cfg.file : '/templates/' + cfg.formato + '.jsx',
  ];
  for (const f of files) {
    const r = await fetch(f);
    if (!r.ok) throw new Error(f + ' não encontrado (' + r.status + ')');
    const src = await r.text();
    const out = Babel.transform(src, { presets: ['react'], filename: f }).code;
    (0, eval)(out);
  }

  const Comp = cfg.component ? window[cfg.component] : window.__ReelComponent;
  if (!Comp) throw new Error('Componente do reel não foi definido (window.__ReelComponent)');
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(Comp));

  // Garante as fontes carregadas antes de sinalizar pronto (o render depende disso).
  const fontJobs = [
    document.fonts.load("700 20px 'IBM Plex Sans'"),
    document.fonts.load("600 20px 'IBM Plex Sans'"),
    document.fonts.load("500 20px 'IBM Plex Sans'"),
    document.fonts.load("700 20px 'IBM Plex Mono'"),
    document.fonts.load("600 20px 'IBM Plex Mono'"),
    document.fonts.load("500 20px 'IBM Plex Mono'"),
  ];
  for (const ff of (theme?.fontFaces || [])) {
    fontJobs.push(document.fonts.load(`${ff.weight || 400} 20px ${JSON.stringify(ff.family)}`).catch(() => {}));
  }
  await Promise.all(fontJobs);
  await document.fonts.ready;

  // Controle externo (Studio): congelar num frame e comandar seek/play via
  // postMessage. O Stage já escuta 'data-om-seek-to-time-frame' no <svg>
  // exportável (pausa + posiciona o playhead); só repassamos o evento.
  const seekTo = (t) => {
    const svg = document.querySelector('svg[data-om-exportable-video-with-duration-secs]');
    if (svg && isFinite(+t)) svg.dispatchEvent(new CustomEvent('data-om-seek-to-time-frame', { detail: { time: +t } }));
  };
  window.addEventListener('message', (e) => {
    const m = e.data || {};
    if (m.type === 'reel-seek') seekTo(m.time);
    // Space é o toggle nativo do Stage (keydown global) — simulamos a tecla.
    if (m.type === 'reel-toggle-play') window.dispatchEvent(new KeyboardEvent('keydown', { code: 'Space', bubbles: true }));
  });

  requestAnimationFrame(() => requestAnimationFrame(() => {
    const freeze = q.get('freeze');
    if (freeze !== null) seekTo(freeze);
    window.__REEL_READY = true;
  }));
})().catch(e => {
  window.__REEL_ERROR = String(e && e.stack || e);
  document.body.innerHTML = '<div id="err"></div>';
  document.getElementById('err').textContent = window.__REEL_ERROR;
});
</script>
</body>
</html>
